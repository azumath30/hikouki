<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飛行機メガネ Step.4</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0f1e;
      color: #e8f0fe;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 56px;
    }
    h1 {
      font-size: 1.3rem; font-weight: 700; color: #7ab4ff;
      letter-spacing: 0.05em; margin-bottom: 8px; text-align: center;
    }
    .subtitle { font-size: 0.8rem; color: #556080; margin-bottom: 32px; text-align: center; }

    /* ボタン */
    .btn {
      display: inline-block; padding: 18px 40px; font-size: 1.2rem; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active   { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d9bf0);
      color: #fff; box-shadow: 0 4px 20px rgba(29,155,240,0.45);
    }
    .btn-retry {
      background: linear-gradient(135deg, #166534, #22c55e);
      color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,0.35);
      font-size: 1rem; padding: 14px 32px; margin-top: 28px;
    }
    .btn-plane {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; font-size: 1rem; padding: 16px 36px;
      box-shadow: 0 4px 20px rgba(168,85,247,0.4);
    }
    .btn-ar {
      background: linear-gradient(135deg, #92400e, #f59e0b);
      color: #1a0a00; font-size: 1rem; padding: 16px 36px;
      box-shadow: 0 4px 20px rgba(245,158,11,0.35);
    }

    /* スピナー */
    #status { font-size: 1rem; color: #7ab4ff; min-height: 28px; margin-top: 16px; text-align: center; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid #223355; border-top-color: #7ab4ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 7px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 位置情報カード */
    #result { width: 100%; max-width: 480px; margin-top: 24px; display: none; }
    .card { background: #111827; border: 1px solid #1e3a5f; border-radius: 16px; padding: 20px 22px; }
    .row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 12px 0; border-bottom: 1px solid #1a2540;
    }
    .row:last-child { border-bottom: none; }
    .label { font-size: 0.85rem; color: #556080; flex-shrink: 0; margin-right: 12px; }
    .value { font-size: 1.5rem; font-weight: 700; color: #e8f0fe; text-align: right; word-break: break-all; }
    .value.accent { color: #7ab4ff; }
    .value.small  { font-size: 1.1rem; }

    /* エラー（位置情報） */
    #error {
      width: 100%; max-width: 480px; margin-top: 24px; display: none;
      background: #1f0a0a; border: 1px solid #7f1d1d; border-radius: 16px; padding: 20px 22px;
    }
    #error .error-title { font-size: 1rem; font-weight: 700; color: #f87171; margin-bottom: 10px; }
    #error .error-body  { font-size: 0.95rem; color: #fca5a5; line-height: 1.6; white-space: pre-wrap; }

    /* 飛行機セクション */
    #planeSection { display: none; width: 100%; max-width: 480px; margin-top: 32px; }
    .radius-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 16px; font-size: 0.9rem; color: #aab4cc;
    }
    .radius-row select {
      background: #1a2540; color: #e8f0fe; border: 1px solid #2a3a5a;
      border-radius: 8px; padding: 6px 10px; font-size: 0.9rem;
    }
    .plane-btns {
      display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center;
    }
    #planeStatus { font-size: 0.95rem; color: #7ab4ff; min-height: 26px; margin: 12px 0; text-align: center; }
    #planeErr {
      display: none; background: #1f0a0a; border: 1px solid #7f1d1d;
      border-radius: 12px; padding: 14px 18px; margin: 8px 0;
    }
    #planeErr .pe-title { font-weight: 700; color: #f87171; margin-bottom: 6px; font-size: 0.95rem; }
    #planeErr .pe-body  { color: #fca5a5; font-size: 0.88rem; line-height: 1.65; white-space: pre-wrap; }
    #planeList { margin-top: 4px; }
    .plane-header { font-size: 0.85rem; color: #7ab4ff; margin-bottom: 10px; padding: 0 2px; }
    .plane-card {
      background: #111827; border: 1px solid #1e3057;
      border-radius: 12px; padding: 12px 16px; margin-bottom: 10px;
    }
    .plane-callsign { font-size: 1.15rem; font-weight: 700; color: #e8f0fe; margin-bottom: 2px; }
    .plane-dist     { font-size: 0.88rem; color: #a78bfa; font-weight: 600; margin-bottom: 8px; }
    .plane-stats    { display: flex; flex-wrap: wrap; gap: 5px 16px; font-size: 0.83rem; color: #aab4cc; }
    .no-planes { text-align: center; color: #556080; font-size: 0.95rem; padding: 36px 0; }
    .credit { margin-top: 20px; text-align: center; font-size: 0.72rem; color: #334466; }
    .credit a { color: #4466aa; text-decoration: none; }

    /* ===== AR オーバーレイ ===== */
    #arOverlay {
      position: fixed; inset: 0; z-index: 300; display: none;
      background: #000; overflow: hidden;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }
    #arVideo {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    #arLabels { position: absolute; inset: 0; pointer-events: none; }

    .ar-label {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(0, 10, 45, 0.82);
      border: 1.5px solid rgba(120, 190, 255, 0.55);
      border-radius: 9px; padding: 5px 11px;
      pointer-events: none;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .ar-cs  { font-size: 0.9rem; font-weight: 700; color: #f0f6ff; line-height: 1.35; }
    .ar-sub { font-size: 0.7rem; color: #7ab4ff; line-height: 1.35; }

    #arDebug {
      position: absolute; top: 16px; left: 16px;
      font-size: 0.72rem; color: rgba(180,210,255,0.92);
      background: rgba(0,5,22,0.65); padding: 7px 12px;
      border-radius: 9px; line-height: 1.75; pointer-events: none;
    }
    #arClose {
      position: absolute; top: 16px; right: 16px;
      background: rgba(80,10,10,0.72); color: #fca5a5;
      border: 1px solid rgba(200,60,60,0.45); border-radius: 9px;
      padding: 9px 18px; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }

    #arErrBox {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 82%; max-width: 340px;
      background: #1a0808; border: 1px solid #7f1d1d;
      border-radius: 14px; padding: 20px; display: none;
    }
    #arErrBox .ae-title { font-weight: 700; color: #f87171; margin-bottom: 8px; }
    #arErrBox .ae-body  { color: #fca5a5; font-size: 0.88rem; line-height: 1.6; white-space: pre-wrap; }

    #arAdjust {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      background: rgba(0,8,36,0.78); padding: 10px 18px;
      border-radius: 14px;
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      white-space: nowrap;
    }
    .adj-lbl { font-size: 0.72rem; color: #8899bb; }
    .adj-btn {
      background: rgba(80,100,180,0.45); color: #cce0ff;
      border: 1px solid rgba(80,120,220,0.4); border-radius: 6px;
      padding: 5px 12px; font-size: 0.82rem; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #arSlider  { width: 90px; accent-color: #7ab4ff; }
    #arOffsetVal {
      font-size: 0.8rem; color: #7ab4ff; font-weight: 600;
      min-width: 34px; text-align: center;
    }
  </style>
</head>
<body>

  <h1>✈ 飛行機メガネ</h1>
  <p class="subtitle">ステップ 4 ― ARモード</p>

  <button id="getBtn" class="btn btn-primary" onclick="getLocation()">📍 位置情報を取得</button>
  <div id="status"></div>

  <div id="error">
    <div class="error-title">⚠️ エラー</div>
    <div id="errorBody" class="error-body"></div>
  </div>

  <div id="result">
    <div class="card">
      <div class="row"><span class="label">緯度</span>    <span id="lat" class="value accent"></span></div>
      <div class="row"><span class="label">経度</span>    <span id="lon" class="value accent"></span></div>
      <div class="row"><span class="label">標高</span>    <span id="alt" class="value"></span></div>
      <div class="row"><span class="label">精度</span>    <span id="acc" class="value"></span></div>
      <div class="row"><span class="label">取得日時</span><span id="ts"  class="value small"></span></div>
    </div>
    <div style="text-align:center">
      <button class="btn btn-retry" onclick="getLocation()">🔄 再取得</button>
    </div>
  </div>

  <div id="planeSection">
    <div class="radius-row">
      <span>検索半径</span>
      <select id="radiusSelect">
        <option value="50">50 海里 (93 km)</option>
        <option value="100" selected>100 海里 (185 km)</option>
        <option value="150">150 海里 (278 km)</option>
        <option value="200">200 海里 (370 km)</option>
        <option value="250">250 海里 (463 km)</option>
      </select>
    </div>
    <div class="plane-btns">
      <button id="planeBtn" class="btn btn-plane" onclick="fetchAircraft()">✈ 飛行機を更新</button>
      <button class="btn btn-ar" onclick="startAR()">📷 ARモード開始</button>
    </div>
    <div id="planeStatus"></div>
    <div id="planeErr">
      <div class="pe-title">⚠️ 取得エラー</div>
      <div id="planeErrBody" class="pe-body"></div>
    </div>
    <div id="planeList"></div>
    <p class="credit">データ提供: <a href="https://adsb.lol" target="_blank" rel="noopener">adsb.lol</a></p>
  </div>

  <!-- AR オーバーレイ -->
  <div id="arOverlay">
    <video id="arVideo" autoplay playsinline muted></video>
    <div id="arLabels"></div>
    <div id="arDebug">方位: ---<br>機体数: -</div>
    <button id="arClose" onclick="stopAR()">✕ 閉じる</button>
    <div id="arErrBox">
      <div class="ae-title">⚠️ ARエラー</div>
      <div id="arErrBody" class="ae-body"></div>
    </div>
    <div id="arAdjust">
      <span class="adj-lbl">方位補正</span>
      <button class="adj-btn" onclick="adjustHeading(-5)">−5°</button>
      <input type="range" id="arSlider" min="-30" max="30" value="0" step="1"
             oninput="onSliderInput(this.value)">
      <button class="adj-btn" onclick="adjustHeading(5)">＋5°</button>
      <span id="arOffsetVal">±0°</span>
    </div>
  </div>

  <script>
    /* ===== 定数 ===== */
    const NM_TO_KM   = 1.852;
    const FT_TO_M    = 0.3048;
    const API_BASE   = 'https://api.adsb.lol/v2/lat';
    const CORS_PROXY = 'https://corsproxy.io/?url=';
    const AR_FOV     = 60;   // 水平視野角(度)

    let myLat = null, myLon = null;

    /* ===== 共通ユーティリティ ===== */
    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function dirLabel(deg) {
      if (deg == null) return '不明';
      const L = ['北','北北東','北東','東北東','東','東南東','南東','南南東',
                 '南','南南西','南西','西南西','西','西北西','北西','北北西'];
      return `${Math.round(deg)}° (${L[Math.round(deg / 22.5) % 16]})`;
    }

    /* ===== 位置情報 (index3.html と同じ) ===== */
    function showStatus(html) { document.getElementById('status').innerHTML = html; }

    function showError(msg) {
      showStatus('');
      document.getElementById('error').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      document.getElementById('errorBody').textContent = msg;
    }

    function showResult(pos) {
      const c = pos.coords;
      myLat = c.latitude; myLon = c.longitude;
      document.getElementById('lat').textContent = c.latitude.toFixed(6) + '°';
      document.getElementById('lon').textContent = c.longitude.toFixed(6) + '°';
      document.getElementById('alt').textContent =
        c.altitude !== null ? c.altitude.toFixed(1) + ' m' : '取得不可';
      document.getElementById('acc').textContent = '± ' + Math.round(c.accuracy) + ' m';
      const d = new Date(pos.timestamp);
      document.getElementById('ts').textContent =
        d.toLocaleDateString('ja-JP') + ' ' + d.toLocaleTimeString('ja-JP');
      showStatus('');
      document.getElementById('error').style.display  = 'none';
      document.getElementById('result').style.display = 'block';
      document.getElementById('planeSection').style.display = 'block';
    }

    function geolocationError(err) {
      const M = {
        1: '位置情報の利用が拒否されました。\nブラウザの設定から「位置情報」の許可を確認してください。',
        2: '位置情報を取得できませんでした。\nGPS 電波が届かない場所か、デバイスが位置情報に対応していない可能性があります。',
        3: '取得がタイムアウトしました。\n電波状況を確認してもう一度お試しください。',
      };
      showError(M[err.code] || `不明なエラーが発生しました（コード: ${err.code}）`);
    }

    function getLocation() {
      if (!navigator.geolocation) {
        showError('このブラウザは位置情報 API に対応していません。\nChromeなど対応ブラウザでお試しください。');
        return;
      }
      document.getElementById('error').style.display  = 'none';
      document.getElementById('result').style.display = 'none';
      showStatus('<span class="spinner"></span>取得中…');
      navigator.geolocation.getCurrentPosition(
        showResult, geolocationError,
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    /* ===== 飛行機一覧取得 (index3.html と同じ) ===== */
    function setPlaneStatus(html) { document.getElementById('planeStatus').innerHTML = html; }
    function clearPlaneErr()      { document.getElementById('planeErr').style.display = 'none'; }
    function setPlaneErr(msg) {
      setPlaneStatus('');
      document.getElementById('planeErrBody').textContent = msg;
      document.getElementById('planeErr').style.display = 'block';
    }
    function setPlaneBtn(d) { document.getElementById('planeBtn').disabled = d; }

    async function fetchAircraft() {
      if (myLat === null) return;
      clearPlaneErr();
      document.getElementById('planeList').innerHTML = '';
      setPlaneStatus('<span class="spinner"></span>取得中…');
      setPlaneBtn(true);

      const radius    = parseInt(document.getElementById('radiusSelect').value) || 100;
      const targetUrl = `${API_BASE}/${myLat.toFixed(6)}/lon/${myLon.toFixed(6)}/dist/${radius}`;
      const fetchUrl  = CORS_PROXY + encodeURIComponent(targetUrl);
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 20000);
      let resp;
      try {
        resp = await fetch(fetchUrl, { signal: ctrl.signal });
      } catch (e) {
        clearTimeout(timer);
        setPlaneErr(e.name === 'AbortError'
          ? 'タイムアウトしました。電波状況を確認して再度お試しください。'
          : `ネットワーク通信に失敗しました。インターネット接続を確認してください。\n(${e.message})`);
        setPlaneBtn(false); return;
      }
      clearTimeout(timer);
      if (!resp.ok) {
        setPlaneErr(`取得失敗　ステータス: ${resp.status}\n`
          + (resp.status === 429 ? 'アクセス制限中です。数秒待って再度お試しください。'
                                 : 'プロキシまたはサーバーでエラーが発生しました。'));
        setPlaneBtn(false); return;
      }
      let data;
      try { data = await resp.json(); }
      catch { setPlaneErr('レスポンスの解析に失敗しました。'); setPlaneBtn(false); return; }
      setPlaneStatus(''); setPlaneBtn(false);
      renderPlanes(data);
    }

    function renderPlanes(data) {
      const aircraft = data.ac || [];
      const listEl   = document.getElementById('planeList');
      const fetchTime = new Date().toLocaleTimeString('ja-JP');
      const planes = aircraft
        .filter(ac => ac.alt_baro !== 'ground' && ac.lat != null && ac.lon != null)
        .sort((a, b) => (a.dst ?? Infinity) - (b.dst ?? Infinity));

      if (planes.length === 0) {
        listEl.innerHTML = '<p class="no-planes">近くに飛行機は見つかりませんでした</p>'; return;
      }
      const h = document.createElement('p');
      h.className = 'plane-header';
      h.textContent = `${planes.length}機を検出（取得時刻 ${fetchTime}）`;
      listEl.appendChild(h);

      for (const ac of planes) {
        const callsign = (ac.flight || '').trim() || '不明';
        const altFt  = ac.alt_geom != null ? ac.alt_geom : ac.alt_baro;
        const altStr = (altFt != null && altFt !== 'ground')
                       ? `${Math.round(altFt * FT_TO_M).toLocaleString()} m` : '不明';
        const spdStr  = ac.gs  != null ? `${Math.round(ac.gs * NM_TO_KM)} km/h` : '不明';
        const distStr = ac.dst != null ? `${(ac.dst * NM_TO_KM).toFixed(1)} km`  : '不明';
        const trkStr  = ac.track != null ? `${Math.round(ac.track)}°` : '不明';
        const card = document.createElement('div');
        card.className = 'plane-card';
        card.innerHTML =
          `<div class="plane-callsign">${escHtml(callsign)}</div>`
        + `<div class="plane-dist">📍 ${distStr}</div>`
        + `<div class="plane-stats">`
        +   `<span>🏔 高度 ${altStr}</span>`
        +   `<span>💨 速度 ${spdStr}</span>`
        +   `<span>🧭 進行 ${trkStr}</span>`
        +   `<span>📡 方位 ${dirLabel(ac.dir)}</span>`
        + `</div>`;
        listEl.appendChild(card);
      }
    }

    /* ===== AR モード ===== */
    let arMode          = false;
    let arStream        = null;
    let arPlanes        = [];
    let arHeading       = null;
    let arHeadingOffset = 0;
    let arFetchTimer    = null;
    let arOrientHandler = null;
    let arOrientEvt     = null;

    function showArErr(msg) {
      document.getElementById('arErrBody').textContent = msg;
      document.getElementById('arErrBox').style.display = 'block';
    }

    async function startAR() {
      // オーバーレイをエラー表示箱として先に出す
      document.getElementById('arOverlay').style.display = 'block';
      document.getElementById('arErrBox').style.display  = 'none';

      // iOS: 方位センサー許可
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        let perm;
        try { perm = await DeviceOrientationEvent.requestPermission(); }
        catch (e) {
          showArErr(`方位センサーの許可取得に失敗しました。\n${e.message}`); return;
        }
        if (perm !== 'granted') {
          showArErr('方位センサーの利用が拒否されました。\niOS の「設定」→ Safari →「モーションと方向へのアクセス」をオンにしてください。');
          return;
        }
      }

      // カメラ取得
      if (!navigator.mediaDevices?.getUserMedia) {
        showArErr('このブラウザはカメラ API に対応していません。Chrome をお使いください。'); return;
      }
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      } catch (e) {
        const M = {
          NotAllowedError:      'カメラの利用が拒否されました。ブラウザの設定から許可してください。',
          NotFoundError:        '背面カメラが見つかりませんでした。',
          OverconstrainedError: 'カメラの設定に問題があります。',
        };
        showArErr(M[e.name] || `カメラエラー: ${e.message}`); return;
      }

      // 成功 → AR 初期化
      arStream = stream; arMode = true;
      arHeading = null; arHeadingOffset = 0;
      document.getElementById('arSlider').value     = 0;
      document.getElementById('arOffsetVal').textContent = '±0°';
      document.getElementById('arLabels').innerHTML = '';
      document.getElementById('arDebug').innerHTML  = '方位: センサー待機中…<br>機体数: -';
      document.getElementById('arVideo').srcObject  = stream;

      // 方位センサー登録（絶対方位 API 優先）
      arOrientEvt = 'ondeviceorientationabsolute' in window
        ? 'deviceorientationabsolute' : 'deviceorientation';

      arOrientHandler = (e) => {
        let h;
        if (e.webkitCompassHeading != null) {
          h = e.webkitCompassHeading;          // iOS 磁北基準
        } else if (e.alpha != null) {
          h = (360 - e.alpha) % 360;           // Android 絶対方位
        } else { return; }
        arHeading = h;
        updateArLabels();
      };
      window.addEventListener(arOrientEvt, arOrientHandler);

      // データ取得: 初回 + 20 秒ごと
      fetchArPlanes();
      arFetchTimer = setInterval(fetchArPlanes, 20000);
    }

    function stopAR() {
      arMode = false;
      if (arFetchTimer)   { clearInterval(arFetchTimer); arFetchTimer = null; }
      if (arOrientHandler && arOrientEvt) {
        window.removeEventListener(arOrientEvt, arOrientHandler);
        arOrientHandler = null;
      }
      if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
      document.getElementById('arVideo').srcObject  = null;
      document.getElementById('arLabels').innerHTML = '';
      document.getElementById('arOverlay').style.display = 'none';
      arHeading = null; arPlanes = [];
    }

    // 方位補正 ---
    function adjustHeading(delta) {
      arHeadingOffset = Math.max(-30, Math.min(30, arHeadingOffset + delta));
      document.getElementById('arSlider').value = arHeadingOffset;
      syncOffsetDisplay(); updateArLabels();
    }
    function onSliderInput(val) {
      arHeadingOffset = parseInt(val);
      syncOffsetDisplay(); updateArLabels();
    }
    function syncOffsetDisplay() {
      const v = arHeadingOffset;
      document.getElementById('arOffsetVal').textContent =
        (v > 0 ? '+' : v < 0 ? '' : '±') + v + '°';
    }

    // AR 用データ取得（API は呼ぶだけ・描画しない）
    async function fetchArPlanes() {
      if (!arMode || myLat === null) return;
      const radius    = parseInt(document.getElementById('radiusSelect').value) || 100;
      const targetUrl = `${API_BASE}/${myLat.toFixed(6)}/lon/${myLon.toFixed(6)}/dist/${radius}`;
      const fetchUrl  = CORS_PROXY + encodeURIComponent(targetUrl);
      try {
        const resp = await fetch(fetchUrl);
        if (!resp.ok) { arDbgNote(`更新失敗 HTTP ${resp.status}`); return; }
        const data = await resp.json();
        arPlanes = (data.ac || []).filter(
          ac => ac.alt_baro !== 'ground' && ac.lat != null && ac.lon != null
        );
        updateArLabels();
      } catch (e) { arDbgNote(`更新失敗: ${e.message}`); }
    }

    function arDbgNote(note) {
      const dbg = document.getElementById('arDebug');
      if (!dbg) return;
      const h = arHeading !== null
        ? Math.round((arHeading + arHeadingOffset + 360) % 360) + '°' : '---';
      dbg.innerHTML =
        `方位: ${h}<br>機体数: ${arPlanes.length}`
      + `<br><span style="color:#f87171">${escHtml(note)}</span>`;
    }

    // delta を -180〜+180 に正規化
    function normDelta(d) {
      d = ((d % 360) + 360) % 360;
      return d > 180 ? d - 360 : d;
    }

    // ラベル再描画（orientationイベントごとに呼ばれる・API は呼ばない）
    function updateArLabels() {
      if (!arMode) return;

      const effH = arHeading !== null
        ? (arHeading + arHeadingOffset + 360) % 360 : null;

      // デバッグ表示更新
      const dbg = document.getElementById('arDebug');
      if (dbg) {
        const hStr   = effH !== null ? `${Math.round(effH)}°` : 'センサー待機中…';
        const offStr = arHeadingOffset !== 0
          ? ` (補正 ${arHeadingOffset > 0 ? '+' : ''}${arHeadingOffset}°)` : '';
        dbg.innerHTML = `方位: ${hStr}${offStr}<br>機体数: ${arPlanes.length}`;
      }

      if (effH === null) return;

      const labelsEl = document.getElementById('arLabels');
      labelsEl.innerHTML = '';
      const W = window.innerWidth, H = window.innerHeight;
      let shown = 0;

      for (const ac of arPlanes) {
        if (ac.dir == null) continue;

        const delta = normDelta(ac.dir - effH);
        if (Math.abs(delta) > AR_FOV / 2) continue;

        // 横位置: delta=0 → 中央、±FOV/2 → 両端
        const x = W * (0.5 + delta / AR_FOV);

        // 仰角 → 縦位置（0°=下, 90°=上）
        const distM  = (ac.dst ?? 1) * 1852;
        const rawAlt = ac.alt_geom != null ? ac.alt_geom
                     : (ac.alt_baro !== 'ground' ? ac.alt_baro : null);
        const altM   = rawAlt != null ? rawAlt * FT_TO_M : 0;
        const elev   = Math.atan2(Math.max(0, altM), distM) * 180 / Math.PI;
        const y      = H * (1.0 - elev / 90.0);
        const yC     = Math.max(72, Math.min(H - 110, y));

        const cs      = (ac.flight || '').trim() || '不明';
        const distKm  = ac.dst != null ? `${(ac.dst * NM_TO_KM).toFixed(1)} km` : '';
        const altStr  = altM > 0 ? `${Math.round(altM).toLocaleString()} m` : '';
        const subLine = [distKm, altStr].filter(Boolean).join(' / ');

        const lbl = document.createElement('div');
        lbl.className  = 'ar-label';
        lbl.style.left = `${x}px`;
        lbl.style.top  = `${yC}px`;
        lbl.innerHTML  =
          `<div class="ar-cs">✈ ${escHtml(cs)}</div>`
        + (subLine ? `<div class="ar-sub">${escHtml(subLine)}</div>` : '');
        labelsEl.appendChild(lbl);
        shown++;
      }

      // 表示機体数をデバッグに追記
      if (dbg && effH !== null) {
        const offStr = arHeadingOffset !== 0
          ? ` (補正 ${arHeadingOffset > 0 ? '+' : ''}${arHeadingOffset}°)` : '';
        dbg.innerHTML =
          `方位: ${Math.round(effH)}°${offStr}<br>`
        + `機体数: ${arPlanes.length}　表示: ${shown}機`;
      }
    }
  </script>
</body>
</html>
